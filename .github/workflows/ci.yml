name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Run ruff linting
        run: ruff check .
      - name: Run ruff formatting
        run: ruff format --check
      - name: Run mypy
        run: mypy .
      - name: Run Tests
        run: pytest tests/ -v

  # Confirm the package installs purely from PyPI wheels (no system GDAL) and
  # works across operating systems. imagecodecs is the only binary dependency.
  cross-platform-install:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install from source (PyPI wheels only)
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Import and run tests
        run: pytest tests/ -v

  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check markdown formatting
        uses: dprint/check@v2.3
